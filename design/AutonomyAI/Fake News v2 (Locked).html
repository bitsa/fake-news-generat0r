<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fakeline — Satirical News, Generated</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E0E0E;
    --bg-2: #161616;
    --bg-3: #1C1C1C;
    --bg-4: #232323;
    --line: #2A2A2A;
    --line-2: #383838;
    --text: #F2F1EE;
    --text-2: #BDBAB3;
    --text-3: #888581;
    --text-4: #5C5A56;
    --accent: #FF5C3D;       /* Autonomy orange */
    --accent-2: #FF8467;
    --accent-ink: #1A0A05;
    --warn: #F5C26B;
    --good: #7CC79A;
    --bad: #E26A6A;
    --nyt: #C7B8A8;
    --npr: #E26A6A;
    --grd: #6EA8DA;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 18px;
    --display: 'Anton', 'Oswald', 'Bebas Neue', sans-serif;
    --serif: 'Fraunces', 'Georgia', serif;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(255,92,61,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,92,61,0.05), transparent 60%),
      var(--bg);
  }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* utility classnames used across components */
  .mono { font-family: var(--mono); }
  .display { font-family: var(--display); letter-spacing: 0.01em; }
  .serif { font-family: var(--serif); }
  .uppercase { text-transform: uppercase; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  .fadein { animation: fadein .35s ease-out both; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .blink { animation: blink 1s steps(2,end) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src-locked/data.jsx"></script>
<script type="text/babel" src="src-locked/icons.jsx"></script>
<script type="text/babel" src="src-locked/atoms.jsx"></script>
<script type="text/babel" src="src-locked/feed.jsx"></script>
<script type="text/babel" src="src-locked/article.jsx"></script>
<script type="text/babel" src="src-locked/chat.jsx"></script>
<script type="text/babel" src="src-locked/admin.jsx"></script>
<script type="text/babel" src="src-locked/app.jsx"></script>

</body>
</html>
